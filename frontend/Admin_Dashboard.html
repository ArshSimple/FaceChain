<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FaceChain Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #cbd5e1; font-family: monospace; }
        .glass { background: rgba(30,41,59,0.7); border:1px solid rgba(148,163,184,0.1); backdrop-filter:blur(10px); }
        ::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-thumb { background:#334155; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4">
        <h1 class="text-2xl font-bold text-white mb-8">FACE<span class="text-blue-500">CHAIN</span></h1>
        <nav class="space-y-2 mb-auto">
            <div class="px-4 py-2 bg-blue-500/10 text-blue-400 rounded border border-blue-500/20 text-xs font-bold tracking-widest">DASHBOARD</div>
            <a href="/" class="block px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded text-xs font-bold transition tracking-widest">👁️ STUDENT VIEW</a>
        </nav>
        <button onclick="logout()" class="w-full py-2 bg-red-900/20 text-red-400 border border-red-900/30 rounded text-xs font-bold hover:bg-red-900/40 transition">LOGOUT</button>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900 shadow-sm">
            <div class="text-xs font-bold text-emerald-500 tracking-widest animate-pulse">● SYSTEM ONLINE</div>
            <button onclick="loadData()" class="text-xs bg-slate-800 text-white px-3 py-1 rounded border border-slate-600 hover:bg-slate-700 transition">FORCE REFRESH</button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-6">
            
            <div class="glass p-6 rounded shadow-lg">
                <h3 class="font-bold text-white mb-4 text-lg">📅 Scheduler</h3>
                <div class="flex gap-4 mb-4">
                    <select id="sched-subject" class="bg-slate-950 border border-slate-700 text-white p-2 rounded w-1/3 text-xs focus:border-blue-500 focus:outline-none">
                        <option>Network Security</option><option>Blockchain</option><option>AI/ML</option>
                    </select>
                    <input type="date" id="sched-date" class="bg-slate-950 border border-slate-700 text-white p-2 rounded w-1/3 text-xs focus:border-blue-500 focus:outline-none">
                    <button onclick="setSchedule()" class="bg-blue-600 hover:bg-blue-500 transition text-white px-6 rounded font-bold text-xs shadow">Set Schedule</button>
                </div>
                <div id="schedule-list" class="space-y-2"></div>
            </div>

            <div class="glass p-6 rounded h-[500px] flex flex-col shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-white text-lg">🎓 Students & Admins Registry</h3>
                    <input type="text" id="userSearch" onkeyup="filterUsers()" placeholder="Search Name/Roll..." class="bg-slate-950 border border-slate-700 text-white px-3 py-1.5 rounded text-xs w-64 focus:border-blue-500 focus:outline-none transition">
                </div>
                <div class="overflow-y-auto border border-slate-800 rounded">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-900 text-slate-500 text-xs uppercase sticky top-0 border-b border-slate-800">
                            <tr>
                                <th class="p-3 font-bold tracking-wider">Name</th>
                                <th class="p-3 font-bold tracking-wider">Roll No</th>
                                <th class="p-3 font-bold tracking-wider">Exam Status / Manage</th>
                                <th class="p-3 font-bold tracking-wider">MFA Control</th> 
                                <th class="p-3 font-bold tracking-wider text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="glass p-6 rounded shadow-lg">
                <h3 class="font-bold text-white mb-2 text-lg">🛡️ Security Logs (Blockchain)</h3>
                <div id="logs-container" class="bg-black h-48 overflow-y-auto p-4 text-xs font-mono text-slate-500 rounded border border-slate-800 shadow-inner">
                    <div class="text-center mt-10 animate-pulse">Waiting for Data...</div>
                </div>
            </div>
        </div>

        <div id="examModal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="glass p-6 rounded border border-slate-700 w-80 shadow-2xl">
                <h3 class="text-white font-bold mb-4 text-center text-lg">Add Subject to User</h3>
                <select id="modal-subject" class="w-full bg-slate-950 border border-slate-700 text-white p-2 rounded text-xs mb-6 focus:outline-none focus:border-blue-500">
                    <option value="Network Security">Network Security</option>
                    <option value="Blockchain">Blockchain</option>
                    <option value="AI/ML">AI/ML</option>
                </select>
                <div class="flex justify-between gap-2">
                    <button onclick="closeModal()" class="w-1/2 px-4 py-2 bg-slate-800 text-slate-300 rounded text-xs font-bold hover:bg-slate-700 transition">Cancel</button>
                    <button onclick="submitNewExam()" class="w-1/2 px-4 py-2 bg-blue-600 text-white rounded text-xs font-bold hover:bg-blue-500 transition shadow">Add Exam</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let allUsers = [];
        let activeUserId = null; 

        async function loadData() {
            try {
                let res = await fetch(`/admin/stats?t=${Date.now()}`);
                if(res.status === 401) { window.location.href = "index.html"; return; }
                
                let data = await res.json();
                allUsers = data.user_list || [];
                renderUsers(allUsers);
                
                if(data.schedule) renderSchedule(data.schedule);
                if(data.logs) renderLogs(data.logs);
            } catch(e) { console.error("Connection Error:", e); }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('userTableBody');
            if(!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500 font-bold tracking-widest">NO USERS FOUND</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => {
                let isAdmin = u.role === 'admin' || u.id === '1'; 
                
                // Allow BOTH admins and students to have exams added/managed
                let statusHtml = u.exam_subjects.map(s => {
                    let isTerminated = u.terminated_exams && u.terminated_exams.includes(s);
                    let isVerified = u.exams_verified && u.exams_verified.includes(s);
                    let color = "bg-slate-800 text-slate-500 border-slate-700";
                    let icon = "○"; let title = "Not Started";

                    if (isTerminated) { color = "bg-red-900/30 text-red-400 border-red-900/50"; icon = "❌"; title = "Terminated"; } 
                    else if (isVerified) { color = "bg-blue-500/10 text-blue-400 border-blue-500/30"; icon = "✓"; title = "Verified"; }
                    
                    return `<button onclick="manageExam('${u.id}', '${s}', 'remove')" class="px-2 py-1 text-[10px] border rounded mr-1 ${color} hover:bg-red-900 hover:text-white transition" title="${title}">${s} ${icon}</button>`;
                }).join('');

                let addBtn = `<button onclick="promptAddExam('${u.id}')" class="px-2 py-1 text-[10px] font-bold border border-slate-600 rounded bg-slate-800 hover:bg-blue-600 text-slate-400 hover:text-white transition">+ ADD</button>`;
                let mfaClass = u.mfa_enabled ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/30" : "bg-slate-700 text-slate-400 border-slate-600";
                
                // Create a cool Admin Badge next to the name
                let nameDisplay = isAdmin ? `${u.name} <span class="ml-2 px-2 py-0.5 bg-blue-900/50 text-blue-400 text-[10px] font-bold rounded border border-blue-800 align-middle">ADMIN</span>` : u.name;

                return `
                <tr class="hover:bg-slate-800/50 transition">
                    <td class="p-3 font-bold text-white whitespace-nowrap">${nameDisplay}</td>
                    <td class="p-3 font-mono text-blue-400">${u.roll_no}</td>
                    <td class="p-3 flex items-center gap-2">${statusHtml} ${addBtn}</td>
                    <td class="p-3"><button onclick="toggleMFA('${u.id}')" class="text-[10px] font-bold px-2 py-1 rounded border ${mfaClass} hover:opacity-80 transition">${u.mfa_enabled ? "ENABLED" : "DISABLED"}</button></td>
                    <td class="p-3 text-right">
                        ${isAdmin 
                            ? '<span class="text-xs text-slate-600 font-bold tracking-widest border border-slate-700 px-2 py-1 rounded bg-slate-800/50">PROTECTED</span>' 
                            : `<button onclick="deleteUser('${u.id}')" class="text-[10px] font-bold tracking-wider text-red-400 bg-red-900/20 px-3 py-1.5 rounded hover:bg-red-900/50 border border-red-900/30 transition shadow">DELETE</button>`
                        }
                    </td>
                </tr>`;
            }).join('');
        }

        function renderSchedule(sched) {
            let html = "";
            for(let [s,d] of Object.entries(sched)) {
                html += `
                <div class="flex justify-between items-center bg-slate-900 p-3 rounded border border-slate-800 hover:border-slate-600 transition shadow-sm">
                    <span class="text-white text-sm font-bold flex-1">${s}</span>
                    <input type="date" value="${d}" onchange="updateSchedule('${s}', this.value)" class="bg-transparent text-emerald-400 font-mono text-xs cursor-pointer focus:outline-none border-b border-transparent hover:border-emerald-500 px-2 transition">
                    <button onclick="delSchedule('${s}')" class="text-red-500 text-xs hover:text-white hover:bg-red-900/50 px-2 py-1 rounded ml-2 transition">❌</button>
                </div>`;
            }
            document.getElementById('schedule-list').innerHTML = html;
        }

        // FIXED RENDER LOGS FUNCTION
        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if(!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-center mt-4 text-slate-600 font-bold tracking-widest">NO LOGS FOUND YET</div>';
                return;
            }
            container.innerHTML = logs.map(l => {
                let colorClass = "text-emerald-400"; // Default green
                let statusUpper = l.status.toUpperCase();
                
                // Strictly catch errors so they don't get confused by the word "MATCH"
                if (statusUpper === "FACE_MISMATCH" || statusUpper === "FAILED" || statusUpper === "USER_NOT_FOUND" || statusUpper === "MULTIPLE_FACES" || statusUpper.includes("ERROR") || statusUpper.includes("FRAUD_DETECTED") || statusUpper.includes("FACE_MISSING")) {
                    colorClass = "text-red-500";
                } else if (statusUpper === "WARNING") {
                    colorClass = "text-yellow-500";
                }

                return `<div class="mb-1 border-b border-slate-900 pb-1 font-mono hover:bg-slate-900/80 transition px-2 rounded">
                    <span class="text-slate-600">[${l.timestamp}]</span> 
                    <span class="${colorClass} font-bold">${l.action} : ${l.status}</span> 
                    <span class="text-slate-500 text-[10px]">(${l.user_id})</span>
                </div>`;
            }).join('');
        }

        function promptAddExam(uid) { 
            activeUserId = uid; 
            document.getElementById('examModal').classList.remove('hidden'); 
        }

        function closeModal() { 
            activeUserId = null; 
            document.getElementById('examModal').classList.add('hidden'); 
        }

        function submitNewExam() {
            let s = document.getElementById('modal-subject').value;
            if(s && activeUserId) {
                manageExam(activeUserId, s, 'add');
                closeModal();
            }
        }

        async function manageExam(uid, sub, action) { if(action === 'add' || confirm(`Remove exam '${sub}' from user?`)) { await fetch('/admin/manage_user_exams', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: uid, subject: sub, action: action}) }); loadData(); } }
        async function setSchedule() { let s = document.getElementById('sched-subject').value; let d = document.getElementById('sched-date').value; if(d) updateSchedule(s, d); }
        async function updateSchedule(s, d) { await fetch('/admin/set_schedule', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({subject:s, date:d})}); loadData(); }
        async function delSchedule(s) { if(confirm('Delete Schedule?')) { await fetch('/admin/delete_schedule', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({subject:s})}); loadData(); } }
        async function deleteUser(id) { if(confirm('Delete User?')) { await fetch('/admin/user_ops', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, action:'delete'}) }); loadData(); } }
        async function toggleMFA(id) { await fetch('/admin/user_ops', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, action:'toggle_mfa'}) }); loadData(); }
        function filterUsers() { let t = document.getElementById('userSearch').value.toLowerCase(); renderUsers(allUsers.filter(u => u.name.toLowerCase().includes(t) || u.roll_no.toLowerCase().includes(t))); }
        async function logout() { await fetch('/logout'); window.location.href="index.html"; }
        
        loadData();
        setInterval(loadData, 5000); 
    </script>
</body>
</html>
